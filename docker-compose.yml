version: "3.8"

services:
  backend:
    image: e-trader-backend2-backend
    container_name: e-trader-backend2
    build: .
    ports:
      - "3002:8080"   # ana nginx ile uyumlu
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/db01
      SPRING_DATASOURCE_USERNAME: db01_user
      SPRING_DATASOURCE_PASSWORD: db01_password
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    container_name: demirayhidrolik-db
    ports:
      - "5433:5432"   # host port 5433 → container 5432
    environment:
      POSTGRES_DB: db01
      POSTGRES_USER: db01_user
      POSTGRES_PASSWORD: db01_password
    volumes:
      - pgdata:/var/lib/postgresql/data   # kalıcı veri

volumes:
  pgdata:



